:root {

* {

.mobile-viewport {

.representative-image {

}

.header-section {

}

.header-section h1 {

}

.header-section p {

.security-banner {

.form-group {

label {

}

/* 글자 수 카운터 스타일 */
.char-counter {
font-size: 0.75rem;

margin-top: 4px;
}

.submit-btn {

border: none;
border-radius: 8px;

font-weight: 600;
cursor: pointer;
transition: background 0.2s;
margin-top: 10px;
}

.submit-btn:disabled {
background-color: #a5c3e0;
cursor: not-allowed;
}

}

.modal-overlay.active {

}

}

.modal-overlay.active .modal-box {
transform: scale(1);
}

.modal-icon {

display: inline-flex;
justify-content: center;
align-items: center;
font-size: 24px;
margin-bottom: 16px;
}

.modal-title {
font-size: 1.15rem;
font-weight: 700;
color: var(--text-main);
margin-bottom: 8px;
}

.modal-desc {

}
